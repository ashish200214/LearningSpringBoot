<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registeration Form</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container bg-primary rounded-4 text-white m-3 p-3">
      <h1 class="bg-primary">All Patients Details</h1>
      <table class="table table-primary">
        <thead>
          <th>Patient ID</th>
          <th>Patient Name</th>

          <th>Patient Address</th>

          <th>Patient Mobile No</th>
          <th>Operations</th>
        </thead>
        <tbody>
          <tr th:each="patient : ${patients}">
            <td th:text="${patient.patientId}"></td>

            <td th:text="${patient.patientName}"></td>

            <td th:text="${patient.address}"></td>

            <td th:text="${patient.mobileNo}"></td>

            <td>
              <a
                class="btn btn-primary"
                th:href="@{/delete/{id}(id=${patient.patientId})}"
                >Delete Patient</a
              >
              <a
                class="btn btn-primary"
                th:href="@{/update/{id}(id=${patient.patientId})}"
                >Update Patient</a
              >
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>
</html>
