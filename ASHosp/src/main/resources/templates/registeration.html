<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registeration Form</title>
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>
    <div class="container bg-primary rounded-4 text-white m-3 p-3">
        <h1 class="bg-primary">Registeration Of Patient</h1>
        <form th:action="@{/submit_registerationForm}" th:object="${patient}" method="post">
  <div class="form-group">
    <label for="email">Patient Name</label>
    <input type="text" class="form-control"  th:field="*{patientName}">
  </div>
  <div class="form-group">
    <label for="pwd">Address</label>
    <input type="text" class="form-control" id="pwd" th:field="*{address}">
  </div>
  
  <div class="form-group">
    <label for="pwd">Mobile No</label>
    <input type="text" class="form-control" id="pwd" th:field="*{mobileNo}" >
  </div>
  <button type="submit" class="btn btn-warning">Submit</button>
</form>
    </div>
</body>
</html>
